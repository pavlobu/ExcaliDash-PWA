[server]
# Hostname advertised on the local network -> excalidash.local
host-name=excalidash
domain-name=local
use-ipv4=yes
use-ipv6=no
# No system D-Bus inside a container.
enable-dbus=no
# Avoid clobbering the host's own mDNS stack when several daemons run.
disallow-other-stacks=no
check-response-ttl=no
use-iff-running=no

[wide-area]
enable-wide-area=no

[publish]
publish-hinfo=no
publish-workstation=no
publish-domain=yes
