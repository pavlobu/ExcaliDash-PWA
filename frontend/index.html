<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="description" content="A self-hosted dashboard and organizer for Excalidraw drawings" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ExcaliDash" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>ExcaliDash</title>
  <script>
    if ('serviceWorker' in navigator && window.location.protocol === 'https:') {
      navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function(error) {
        console.warn('[PWA] Early service worker registration failed:', error);
      });
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script>
    (function () {
      if (typeof window.EXCALIDRAW_ASSET_PATH === "string" && window.EXCALIDRAW_ASSET_PATH.length > 0) return;
      var base = "%BASE_URL%";
      if (base === "%BASE_URL%") base = "/";
      if (base && base[base.length - 1] !== "/") base += "/";
      window.EXCALIDRAW_ASSET_PATH = new URL(base || "/", window.location.origin).toString();
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
